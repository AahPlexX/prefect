name = "prefect-api"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# ─── KV Namespaces ─────────────────────────────────────────────────────────────
# Create before deploying:
#   wrangler kv:namespace create "SUBMISSIONS"
#   wrangler kv:namespace create "SUBMISSIONS" --preview
# Then replace the ids below with the output.
[[kv_namespaces]]
binding = "SUBMISSIONS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

# ─── CORS allowed origins ──────────────────────────────────────────────────────
# Add your Cloudflare Pages domain here after deployment.
[vars]
ALLOWED_ORIGIN = "https://prefect.pages.dev"

# ─── Routes ────────────────────────────────────────────────────────────────────
# Uncomment and update after setting up Cloudflare Pages custom domain:
# [[routes]]
# pattern = "api.your-domain.com/*"
# zone_name = "your-domain.com"
